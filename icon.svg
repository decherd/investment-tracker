<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0f2d4a"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#roundedClip)" opacity="0.07">
    <line x1="0" y1="170" x2="512" y2="170" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="342" x2="512" y2="342" stroke="white" stroke-width="1.5"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1.5"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1.5"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Chart area fill -->
  <polygon
    points="76,380 76,310 160,260 230,285 310,190 390,150 436,130 436,380"
    fill="url(#chartGrad)"
    clip-path="url(#roundedClip)"/>

  <!-- Chart line -->
  <polyline
    points="76,310 160,260 230,285 310,190 390,150 436,130"
    fill="none"
    stroke="#22d3ee"
    stroke-width="14"
    stroke-linejoin="round"
    stroke-linecap="round"/>

  <!-- Glowing dot at the end -->
  <circle cx="436" cy="130" r="18" fill="#22d3ee" opacity="0.3"/>
  <circle cx="436" cy="130" r="11" fill="#22d3ee"/>

  <!-- Dollar sign -->
  <text x="104" y="196" font-family="-apple-system, Arial, sans-serif" font-weight="800"
        font-size="90" fill="white" opacity="0.9">$</text>

  <!-- Bar chart at bottom left -->
  <rect x="76" y="330" width="28" height="50" rx="6" fill="#4ade80" opacity="0.85"/>
  <rect x="116" y="310" width="28" height="70" rx="6" fill="#4ade80" opacity="0.85"/>
  <rect x="156" y="295" width="28" height="85" rx="6" fill="#4ade80" opacity="0.85"/>
</svg>
